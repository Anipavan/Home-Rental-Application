server:
  port: ${SERVER_PORT:9090}
  shutdown: graceful

spring:
  application:
    name: HRA-auth-service

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    # Hard placeholder so a missed env var blows up at startup via
    # SecretsBootstrapValidator instead of silently using a known weak
    # password. Set DB_PASSWORD in your shell/.env for local dev or in
    # Vault/K8s secrets for prod.
    password: ${DB_PASSWORD:CHANGE_ME_LOCAL_DEV_PLACEHOLDER}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false

# Bound by KafkaTopicProperties (in KafkaEvents shared lib)
app:
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    # Validated at startup by SecretsBootstrapValidator. The placeholder
    # below is recognised + refused in prod profiles — must be replaced.
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60

  jwt:
    # Override in prod via JWT_SECRET env / Vault. Must be at least 256 bits.
    # Default below is a length-padded placeholder so HMAC-SHA256 accepts it
    # for local dev; SecretsBootstrapValidator refuses it in prod profiles.
    secret: ${JWT_SECRET:CHANGE_ME_LOCAL_DEV_JWT_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG_ABC}
    # Stabilization sprint: tightened from 1h / 30d to 15min / 7d to enforce
    # real session expiry. Frontend additionally enforces a 30-min idle timeout.
    access-token-validity-seconds: ${JWT_ACCESS_TTL:900}          # 15 minutes
    refresh-token-validity-seconds: ${JWT_REFRESH_TTL:604800}     # 7 days
    issuer: ${JWT_ISSUER:home-rental-auth}
  password-reset:
    token-validity-minutes: ${PASSWORD_RESET_TTL_MINUTES:15}

feign:
  # Wrap each Feign client in a Resilience4j CircuitBreaker. Combined with
  # the per-client Resilience4j instance config below, this gives us per-
  # downstream-service breakers + fallbacks (see *FallbackFactory classes).
  circuitbreaker:
    enabled: true
    # Group all method calls per Feign client into one breaker named after
    # the @FeignClient(name=...). Without this every method gets its own
    # breaker, which makes failure-rate computation noisy on low-traffic
    # endpoints.
    group:
      enabled: false
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 60000
        # We rely on Resilience4j retry below; keep Feign's own retryer as
        # NeverRetry so we don't double-retry.
        retryer: feign.Retryer$NeverRetry
        loggerLevel: BASIC

# ---------- Resilience4j (Feign-side) ----------
# Names MUST match the @FeignClient(name=...) values: HRA-user-service.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      HRA-user-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 6s
        cancelRunningFuture: true
    instances:
      HRA-user-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        # Only retry on transient classes — never on application-level errors.
        retryExceptions:
          - feign.RetryableException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignoreExceptions:
          - org.springframework.web.server.ResponseStatusException

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    feign: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
