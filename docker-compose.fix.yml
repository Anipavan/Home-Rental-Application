# ─────────────────────────────────────────────────────────────────
# docker-compose.fix.yml — minimal env injection for the pre-batch-1
# baseline deployment.
#
# This file exists because the base docker-compose.yml's flat env
# block was shadowing the docker-compose.prod.yml `*spring-jpa-env`
# anchor (a Compose overlay-merge quirk with cross-file YAML
# aliases). Result: services booted with profile=dev and
# DB_USERNAME=siva regardless of what prod.yml said.
#
# We re-declare the critical env vars here as a flat map so Compose
# unambiguously merges them on top of both earlier files.
# ─────────────────────────────────────────────────────────────────

x-prod-env: &prod-env
  SPRING_PROFILES_ACTIVE: prod
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  # ─────────────────────────────────────────────────────────────────
  # Schema management — Hibernate, not Flyway. Read before changing!
  #
  # The current V1__baseline.sql files in every service are NO-OP
  # placeholders that just stamp a baseline. There are no CREATE
  # TABLE migrations — the whole deployment has always relied on
  # Hibernate's ddl-auto=update to bring up the schema on first
  # boot. V2+ migrations (e.g. KYC digilocker_columns) are additive
  # ALTERs that assume the base tables already exist.
  #
  # Enforcing prod's ddl-auto=validate + Flyway-managed schema fails
  # on a fresh DB because nothing creates the tables. Services
  # crash with "Schema-validation: missing table [foo]".
  #
  # Until proper V1__create_schema.sql files are written, these
  # overrides restore the original working behaviour:
  #   - Hibernate manages schema: creates tables, adds columns to
  #     match entity definitions on every restart.
  #   - Flyway is disabled entirely so it doesn't fight Hibernate
  #     and doesn't pollute history tables with failed migration
  #     rows that block subsequent boots.
  # ─────────────────────────────────────────────────────────────────
  SPRING_FLYWAY_ENABLED: "false"
  SPRING_JPA_HIBERNATE_DDL_AUTO: update

services:
  # ─────────────────────────────────────────────────────────────────
  # Kafka + Zookeeper memory hardening (2026-05-25)
  #
  # Why: hra-kafka was OOM-killed (exit 137) on 2026-05-25 while the
  # 2 GB droplet was running 12+ JVMs. The kernel picks the largest
  # idle allocator first — Kafka, with its default 1 GB heap + ~500 MB
  # off-heap, was the obvious target. The kill froze every service
  # that publishes Kafka events (auth-service login goes through the
  # outbox), tripped the gateway's circuit breaker, and surfaced as
  # "Service Unavailable" on every browser login attempt.
  #
  # Fix:
  #   1. Cap the JVM heap so Kafka can't grow into a kill target.
  #      256m..512m is plenty for the event volume on this deployment
  #      (a few rent / lease / KYC events per minute at peak).
  #   2. mem_limit pins Docker's cgroup ceiling slightly above the
  #      heap so the JVM gets a clean OOM inside the container
  #      (Docker auto-restart) instead of the kernel killing it
  #      (slow recovery, breaks circuit breakers).
  #   3. restart: unless-stopped means even a worst-case OOM
  #      recovers in seconds without manual intervention.
  #
  # Zookeeper is much smaller but capped on the same principle — if
  # it dies, Kafka can't elect controllers and the whole event bus
  # silently locks up. Same restart policy as a belt-and-braces.
  # ─────────────────────────────────────────────────────────────────
  zookeeper:
    environment:
      # cp-zookeeper image reads KAFKA_HEAP_OPTS for its JVM.
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    mem_limit: 384m
    mem_reservation: 192m
    restart: unless-stopped

  kafka:
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    mem_limit: 768m
    mem_reservation: 384m
    restart: unless-stopped

  # Auth-service is the choke point for every UI request — losing it
  # bricks login site-wide. Auto-restart so a one-off OOM or transient
  # crash self-heals before the operator notices.
  auth-service:
    restart: unless-stopped
    environment:
      <<: *prod-env

  # ─────────────────────────────────────────────────────────────────
  # Low-traffic JVM caps (2026-05-27)
  #
  # The host had been running 12+ Spring services on 8 GB RAM with
  # default JVM heaps (~600-800 MB each), pushing 3.7 GB of swap
  # usage and triggering 200+ second cold-boot times on the
  # rarely-used services. When the gateway circuit breaker timeout
  # is shorter than the cold-boot window, requests during a restart
  # storm the breaker open and the affected route returns 503 to
  # the browser even though the service eventually comes up healthy.
  #
  # Hard cap each low-traffic JVM at ~256 MB heap + 512 MB container
  # limit. Frees ~2 GB across the fleet, keeps swap < 1 GB, and
  # boots come down to <60 s where the gateway's circuit-breaker
  # tolerates them.
  #
  # JAVA_TOOL_OPTIONS is the universal Spring Boot lever — applies
  # to every JVM in the container without code changes. -Xms is set
  # equal to ~half of -Xmx so the heap starts compact and grows
  # only if real load demands it.
  #
  # restart: unless-stopped means a true OOM (rare with this cap)
  # auto-recovers in seconds instead of waiting for an operator.
  # ─────────────────────────────────────────────────────────────────
  kyc-service:
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      <<: *prod-env
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxRAMPercentage=70"
      KYC_PROVIDER: ${KYC_PROVIDER:-MOCK}
      PAN_ONLY_KYC: ${PAN_ONLY_KYC:-false}
      SANDBOX_API_KEY: ${SANDBOX_API_KEY:-}
      SANDBOX_API_SECRET: ${SANDBOX_API_SECRET:-}

  compliance-service:
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      <<: *prod-env
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxRAMPercentage=70"

  document-service:
    # Document service handles file uploads + OCR pipelines — needs
    # slightly more headroom for multipart buffers and image decoding
    # than the other low-traffic services.
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 384m
    environment:
      <<: *prod-env
      JAVA_TOOL_OPTIONS: "-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=70"
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 25MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 25MB
      DOCUMENT_OCR_PROVIDER: ${DOCUMENT_OCR_PROVIDER:-STUB}
      DOCUMENT_OCR_AUTO_EXTRACT: ${DOCUMENT_OCR_AUTO_EXTRACT:-true}
      SANDBOX_API_KEY: ${SANDBOX_API_KEY:-}
      SANDBOX_API_SECRET: ${SANDBOX_API_SECRET:-}

  review-service:
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      <<: *prod-env
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxRAMPercentage=70"

  analytics-service:
    # Analytics runs heavier in-memory aggregations than the other
    # back-office services — bump the heap a tad to keep GC sane.
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 384m
    environment:
      <<: *prod-env
      JAVA_TOOL_OPTIONS: "-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=70"

  maintenance-service:
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      <<: *prod-env
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:MaxRAMPercentage=70"

  # ─────────────────────────────────────────────────────────────────
  # Hot-path services kept on default heaps for now.
  #
  # user-service, property-service, payment-service, lease-service
  # carry the bulk of the request volume — they get touched on every
  # browse, every assign-tenant, every rent payment. Capping their
  # heaps below the default would risk pause-times under real traffic.
  # If we ever see them under memory pressure too, add caps here.
  # ─────────────────────────────────────────────────────────────────
  user-service:
    environment:
      <<: *prod-env
  property-service:
    environment:
      <<: *prod-env
  payment-service:
    environment:
      <<: *prod-env
      # Required since the production-readiness pass (2026-05-24): the
      # MockPaymentGateway bean no longer matches-if-missing, so this
      # MUST be set explicitly or payment-service refuses to boot in
      # prod profile. Use `mock` for smoke testing; flip to `razorpay`
      # once APP_RAZORPAY_* secrets are wired in .env.
      APP_PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-mock}
      # Razorpay-specific (no-op when APP_PAYMENT_GATEWAY=mock):
      APP_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      APP_RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      APP_RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
  lease-service:
    environment:
      <<: *prod-env
