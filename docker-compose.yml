name: home-rental

# Full-stack docker-compose for the Home Rental platform.
#
#   docker compose up -d                # start everything
#   docker compose logs -f api-gateway  # follow a single service
#   docker compose down -v              # tear down + drop volumes
#
# Services come up in dependency order:
#   1. Infrastructure: oracle-db, mongodb, zookeeper, kafka
#   2. Discovery + config: service-registry, config-server
#   3. API Gateway, then domain services
# Spring Boot's healthcheck-aware `depends_on` ensures each tier waits.

services:

  # ========================================================================
  # INFRASTRUCTURE
  # ========================================================================

  oracle-db:
    image: gvenzl/oracle-free:23.5-slim
    container_name: hra-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-Pavan@123}
      APP_USER: ${ORACLE_APP_USER:-siva}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
    # No host port binding. Every backend reaches Oracle via the
    # internal `hra-net` Docker network at oracle-db:1521. Exposing
    # 1521 on the host was a real risk — anyone scanning the VPS IP
    # could hit Oracle's listener directly. For local debugging
    # use `docker exec hra-oracle sqlplus ...` or
    # `docker run --rm --network home-rental_hra-net …` to reach it.
    expose:
      - "1521"
    volumes: ["oracle-data:/opt/oracle/oradata"]
    networks: [hra-net]
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  mongodb:
    image: mongo:7
    container_name: hra-mongo
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
    networks: [hra-net]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hra-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]
    networks: [hra-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hra-kafka
    depends_on: [zookeeper]
    ports: ["9093:9093"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes: ["kafka-data:/var/lib/kafka/data"]
    networks: [hra-net]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ========================================================================
  # DISCOVERY + CONFIG (must be up before any domain service)
  # ========================================================================

  service-registry:
    build: ./Service-Registry
    container_name: hra-service-registry
    ports: ["8761:8761"]
    networks: [hra-net]
    environment:
      EUREKA_HOSTNAME: service-registry
      EUREKA_REGISTER: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  config-server:
    build: ./config-server
    container_name: hra-config-server
    depends_on:
      service-registry:
        condition: service_healthy
    ports: ["8888:8888"]
    networks: [hra-net]
    environment:
      EUREKA_URL: http://service-registry:8761/eureka
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ========================================================================
  # API GATEWAY
  # ========================================================================

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: hra-api-gateway
    depends_on:
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8080:8080"]
    networks: [hra-net]
    environment:
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      JWT_SECRET: ${JWT_SECRET:-U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODkwIQ==}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}

  # ========================================================================
  # DOMAIN SERVICES
  # ========================================================================

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: hra-auth-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["9090:9090"]
    networks: [hra-net]
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      JWT_SECRET: ${JWT_SECRET:-U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODkwIQ==}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}

  property-service:
    build:
      context: .
      dockerfile: property-service/Dockerfile
    container_name: hra-property-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8088:8088"]
    networks: [hra-net]
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: hra-user-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8089:8089"]
    networks: [hra-net]
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: hra-payment-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8084:8084"]
    networks: [hra-net]
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-mock}
      # Razorpay credentials — only consumed when PAYMENT_GATEWAY=razorpay.
      # Empty defaults so the mock-gateway dev path (and CI) don't fail
      # SecretsBootstrapValidator on startup. Real values come from .env in
      # prod — see RazorpayProperties + RazorpayPaymentGateway constructor.
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      # Used to build the Razorpay checkout callback_url so the user is
      # redirected back to /app/payments/:id/return after they submit
      # card / netbanking details. Without it Razorpay shows its own
      # success page and the payment row stays stuck in PROCESSING.
      FRONTEND_URL: ${FRONTEND_URL:-https://anirudhhomes.in}

  maintenance-service:
    build:
      context: .
      dockerfile: maintenance-service/Dockerfile
    container_name: hra-maintenance-service
    depends_on:
      mongodb:          {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8085:8085"]
    networks: [hra-net]
    environment:
      MONGO_URI: mongodb://mongodb:27017/HomeRentalDB
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: hra-notification-service
    depends_on:
      mongodb:          {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8086:8086"]
    networks: [hra-net]
    environment:
      MONGO_URI: mongodb://mongodb:27017/HomeRentalDB
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      NOTIFICATION_DELIVERY: "false"   # don't send real emails in dev compose

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: hra-analytics-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8087:8087"]
    networks: [hra-net]
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}

  # ========================================================================
  # INDIA COMPLIANCE LAYER
  #   - kyc-service:        Aadhaar / PAN / DigiLocker (Digio adapter)
  #   - compliance-service: RERA registration + GST invoicing (PDFs)
  #   - lease-service:      Lease lifecycle + RERA-stamped lease deeds
  #   - document-service:   Secure upload + OCR + pre-signed downloads
  # ========================================================================

  kyc-service:
    build:
      context: .
      dockerfile: KYCService/Dockerfile
    container_name: hra-kyc-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8092:8092"]
    networks: [hra-net]
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      # KYC provider — keep MOCK for dev / CI; switch to DIGIO or SANDBOX once creds wired
      KYC_PROVIDER: ${KYC_PROVIDER:-MOCK}
      KYC_AADHAAR_SALT: ${KYC_AADHAAR_SALT:-change-me-in-prod-aadhaar-pepper}
      DIGIO_BASE_URL: ${DIGIO_BASE_URL:-https://api.digio.in}
      DIGIO_API_KEY: ${DIGIO_API_KEY:-}
      DIGIO_CLIENT_ID: ${DIGIO_CLIENT_ID:-}
      DIGIO_CALLBACK_URL: ${DIGIO_CALLBACK_URL:-http://api-gateway:8080/api/kyc/webhook/digio}
      # Sandbox.co.in — PAN-only NSDL verification (cheap KYC for solo
      # developers). Keys are account-scoped and can be rotated
      # independently of DigiLocker. Empty defaults so MOCK-profile dev
      # builds don't fail on missing values.
      SANDBOX_BASE_URL: ${SANDBOX_BASE_URL:-https://api.sandbox.co.in}
      SANDBOX_API_KEY: ${SANDBOX_API_KEY:-}
      SANDBOX_API_SECRET: ${SANDBOX_API_SECRET:-}
      SANDBOX_API_VERSION: ${SANDBOX_API_VERSION:-1.0}
      SANDBOX_PAN_VERIFY_PATH: ${SANDBOX_PAN_VERIFY_PATH:-/kyc/pan/verify}
      SANDBOX_AUTH_PATH: ${SANDBOX_AUTH_PATH:-/authenticate}
      # DigiLocker (MeitY) — paused until incorporation (task #43);
      # placeholders so SecretsBootstrapValidator doesn't fail-fast.
      DIGILOCKER_CLIENT_ID: ${DIGILOCKER_CLIENT_ID:-}
      DIGILOCKER_CLIENT_SECRET: ${DIGILOCKER_CLIENT_SECRET:-}
      DIGILOCKER_REDIRECT_URI: ${DIGILOCKER_REDIRECT_URI:-}

  compliance-service:
    build:
      context: .
      dockerfile: ComplanceService/Dockerfile
    container_name: hra-compliance-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8093:8093"]
    networks: [hra-net]
    volumes:
      - gst-invoices:/data/gst-invoices
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      COMPLIANCE_INVOICE_DIR: /data/gst-invoices
      COMPLIANCE_GST_THRESHOLD: ${COMPLIANCE_GST_THRESHOLD:-2000000.00}
      COMPLIANCE_GST_RATE: ${COMPLIANCE_GST_RATE:-18.00}
      RERA_PROVIDER: ${RERA_PROVIDER:-MOCK}

  lease-service:
    build:
      context: .
      dockerfile: LeaseService/Dockerfile
    container_name: hra-lease-service
    depends_on:
      oracle-db:          {condition: service_healthy}
      kafka:              {condition: service_healthy}
      service-registry:   {condition: service_healthy}
      config-server:      {condition: service_healthy}
      compliance-service: {condition: service_started}
    ports: ["8090:8090"]
    networks: [hra-net]
    volumes:
      - lease-deeds:/data/lease-deeds
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      LEASE_DEED_DIR: /data/lease-deeds
      LEASE_EXPIRY_WARNING_DAYS: ${LEASE_EXPIRY_WARNING_DAYS:-60}
      LEASE_RENT_INCREMENT_PERCENT: ${LEASE_RENT_INCREMENT_PERCENT:-5.0}
      LEASE_EXPIRY_CRON: ${LEASE_EXPIRY_CRON:-0 0 2 * * *}

  document-service:
    build:
      context: .
      dockerfile: DocumentationService/Dockerfile
    container_name: hra-document-service
    depends_on:
      oracle-db:        {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8091:8091"]
    networks: [hra-net]
    volumes:
      - documents:/data/documents
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${ORACLE_APP_USER:-siva}
      DB_PASSWORD: ${ORACLE_APP_PASSWORD:-Pavan@123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-LOCAL}
      DOCUMENT_LOCAL_DIR: /data/documents
      DOCUMENT_S3_BUCKET: ${DOCUMENT_S3_BUCKET:-rentgenius-documents}
      DOCUMENT_DOWNLOAD_TTL: ${DOCUMENT_DOWNLOAD_TTL:-900}
      DOCUMENT_DOWNLOAD_SECRET: ${DOCUMENT_DOWNLOAD_SECRET:-change-me-in-prod-doc-download-secret}
      DOCUMENT_OCR_PROVIDER: ${DOCUMENT_OCR_PROVIDER:-STUB}

  review-service:
    build:
      context: .
      dockerfile: ReviewService/Dockerfile
    container_name: hra-review-service
    depends_on:
      mongodb:          {condition: service_healthy}
      kafka:            {condition: service_healthy}
      service-registry: {condition: service_healthy}
      config-server:    {condition: service_healthy}
    ports: ["8094:8094"]
    networks: [hra-net]
    environment:
      MONGO_URI: mongodb://mongodb:27017/HomeRentalDB
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:-Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
      REVIEWS_AUTO_PUBLISH: ${REVIEWS_AUTO_PUBLISH:-true}

# ============================================================================
volumes:
  oracle-data:
  mongo-data:
  kafka-data:
  gst-invoices:
  lease-deeds:
  documents:

networks:
  hra-net:
    driver: bridge
