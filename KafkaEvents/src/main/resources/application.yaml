spring:
  application:
    name: KafkaEvents

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"

    properties:
      spring.json.add.type.headers: false

# Single source of truth for topic names — bound by KafkaTopicProperties.
# Every service that depends on the KafkaEvents jar reads these same keys
# from its own application.yaml.
app:
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
