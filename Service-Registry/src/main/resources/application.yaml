server:
  port: ${SERVER_PORT:8761}
  shutdown: graceful

spring:
  application:
    name: service-registry
  lifecycle:
    timeout-per-shutdown-phase: 20s

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    # An Eureka SERVER never registers with itself or fetches from itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_PEER_URL:http://${eureka.instance.hostname}:${server.port}/eureka/}
  server:
    # Disable self-preservation in dev so dead instances are evicted promptly.
    # In prod set this to true to ride out network partitions.
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    # Sweep dead leases every 5 seconds (default 60s)
    eviction-interval-timer-in-ms: 5000
    # Wait 10 seconds after startup before serving registry queries
    wait-time-in-ms-when-sync-empty: 10000

# ---------- Operational endpoints ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ---------- Logging ----------
logging:
  level:
    root: INFO
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
