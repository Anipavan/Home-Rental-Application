server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: HRA-api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 20s

  cloud:
    loadbalancer:
      retry:
        enabled: true
        retryable-status-codes: 502,503,504
        max-retries-on-same-service-instance: 0
        max-retries-on-next-service-instance: 1
        retry-on-all-operations: false
      health-check:
        initial-delay: 5s
        interval: 15s
      cache:
        ttl: 30s
        capacity: 256
    gateway:
      discovery:
        locator:
          enabled: false
      httpclient:
        connect-timeout: 2000
        response-timeout: 10s
      default-filters:
        - AddResponseHeader=X-API-Version, v1
      routes:
        # ===== v1 routes =====
        - id: auth-service-v1
          uri: lb://HRA-auth-service
          predicates: [Path=/rentals/v1/auth/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: authServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/auth}

        - id: property-service-v1
          uri: lb://HRA-property-service
          predicates: [Path=/rentals/v1/properties/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: propertyServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/property}

        - id: user-service-v1
          uri: lb://HRA-user-service
          predicates: [Path=/rentals/v1/users/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: userServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/user}

        - id: payment-service-v1
          uri: lb://HRA-payment-service
          predicates: [Path=/rentals/v1/payments/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: paymentServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/payment}

        - id: maintenance-service-v1
          uri: lb://HRA-maintenance-service
          predicates: [Path=/rentals/v1/maintenance/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: maintenanceServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/maintenance}

        - id: notification-service-v1
          uri: lb://HRA-notification-service
          predicates: [Path=/rentals/v1/notifications/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: notificationServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/notification}

        - id: analytics-service-v1
          uri: lb://HRA-analytics-service
          predicates: [Path=/rentals/v1/analytics/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: analyticsServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/analytics}

        # ----- India Compliance Layer (v1) -----
        - id: kyc-service-v1
          uri: lb://HRA-kyc-service
          predicates: [Path=/rentals/v1/kyc/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: kycServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/kyc}

        - id: compliance-service-v1
          uri: lb://HRA-compliance-service
          predicates: [Path=/rentals/v1/compliance/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: complianceServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/compliance}

        - id: lease-service-v1
          uri: lb://HRA-lease-service
          predicates: [Path=/rentals/v1/lease/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: leaseServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/lease}

        - id: document-service-v1
          uri: lb://HRA-document-service
          predicates: [Path=/rentals/v1/documents/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: documentServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/document}

        - id: review-service-v1
          uri: lb://HRA-review-service
          predicates: [Path=/rentals/v1/reviews/**]
          filters:
            - RewritePath=/rentals/v1/(?<segment>.*), /$\{segment}
            - AddResponseHeader=X-API-Version, v1
            - name: CircuitBreaker
              args: {name: reviewServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/review}

        # ===== legacy routes (deprecated) =====
        - id: auth-service-legacy
          uri: lb://HRA-auth-service
          predicates: [Path=/api/auth/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/auth/** instead"
            - name: CircuitBreaker
              args: {name: authServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/auth}

        - id: property-service-legacy
          uri: lb://HRA-property-service
          predicates: [Path=/api/properties/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/properties/** instead"
            - name: CircuitBreaker
              args: {name: propertyServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/property}

        - id: user-service-legacy
          uri: lb://HRA-user-service
          predicates: [Path=/api/users/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/users/** instead"
            - name: CircuitBreaker
              args: {name: userServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/user}

        - id: payment-service-legacy
          uri: lb://HRA-payment-service
          predicates: [Path=/api/payments/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/payments/** instead"
            - name: CircuitBreaker
              args: {name: paymentServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/payment}

        - id: maintenance-service-legacy
          uri: lb://HRA-maintenance-service
          predicates: [Path=/api/maintenance/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/maintenance/** instead"
            - name: CircuitBreaker
              args: {name: maintenanceServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/maintenance}

        - id: notification-service-legacy
          uri: lb://HRA-notification-service
          predicates: [Path=/api/notifications/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/notifications/** instead"
            - name: CircuitBreaker
              args: {name: notificationServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/notification}

        - id: analytics-service-legacy
          uri: lb://HRA-analytics-service
          predicates: [Path=/api/analytics/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/analytics/** instead"
            - name: CircuitBreaker
              args: {name: analyticsServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/analytics}

        # ----- India Compliance Layer (legacy /api prefix) -----
        - id: kyc-service-legacy
          uri: lb://HRA-kyc-service
          predicates: [Path=/api/kyc/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/kyc/** instead"
            - name: CircuitBreaker
              args: {name: kycServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/kyc}

        - id: compliance-service-legacy
          uri: lb://HRA-compliance-service
          predicates: [Path=/api/compliance/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/compliance/** instead"
            - name: CircuitBreaker
              args: {name: complianceServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/compliance}

        - id: lease-service-legacy
          uri: lb://HRA-lease-service
          predicates: [Path=/api/lease/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/lease/** instead"
            - name: CircuitBreaker
              args: {name: leaseServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/lease}

        - id: document-service-legacy
          uri: lb://HRA-document-service
          predicates: [Path=/api/documents/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/documents/** instead"
            - name: CircuitBreaker
              args: {name: documentServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/document}

        - id: review-service-legacy
          uri: lb://HRA-review-service
          predicates: [Path=/api/reviews/**]
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-API-Version, legacy
            - AddResponseHeader=X-Deprecation, "true"
            - AddResponseHeader=X-Deprecation-Hint, "Use /rentals/v1/reviews/** instead"
            - name: CircuitBreaker
              args: {name: reviewServiceCircuitBreaker, fallbackUri: forward:/__cb/fallback/review}

        # ===== Swagger aggregation routes =====
        # Springdoc cold spec generation can take 15-30s; bump per-route timeout to 60s.
        - id: aggregate-auth-docs
          uri: lb://HRA-auth-service
          predicates: [Path=/aggregate/auth-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-property-docs
          uri: lb://HRA-property-service
          predicates: [Path=/aggregate/property-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-user-docs
          uri: lb://HRA-user-service
          predicates: [Path=/aggregate/user-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-payment-docs
          uri: lb://HRA-payment-service
          predicates: [Path=/aggregate/payment-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-maintenance-docs
          uri: lb://HRA-maintenance-service
          predicates: [Path=/aggregate/maintenance-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-notification-docs
          uri: lb://HRA-notification-service
          predicates: [Path=/aggregate/notification-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-analytics-docs
          uri: lb://HRA-analytics-service
          predicates: [Path=/aggregate/analytics-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-kyc-docs
          uri: lb://HRA-kyc-service
          predicates: [Path=/aggregate/kyc-service/v3/api-docs/**]
          filters: [StripPrefix=2]
          metadata: {response-timeout: 60000, connect-timeout: 5000}

        - id: aggregate-compliance-docs
          uri: lb://HRA-compliance-service
          predicates: [Path=/aggregate/compliance-service/v3/api-docs/**]
          filters: [StripPrefix=2]
