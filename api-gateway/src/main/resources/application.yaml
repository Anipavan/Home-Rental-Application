# ---------- App-specific config ----------
app:
  jwt:
    # MUST be set via env in prod. Length-padded placeholder accepted in
    # dev for HMAC-SHA256; SecretsBootstrapValidator refuses placeholder
    # outside dev profiles.
    secret: ${JWT_SECRET:CHANGE_ME_LOCAL_DEV_JWT_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG_ABC}
    issuer: ${JWT_ISSUER:home-rental-auth}
  internal-auth:
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60
  gateway:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,Accept,X-Requested-With
      max-age-seconds: 3600
    # Patterns can be method-scoped ("GET /path/**") or any-method
    # (legacy bare path). Method scoping is essential for routes where
    # public READS are intentional but WRITES must stay locked behind
    # JWT — e.g. property listings (public browse) vs property mutations
    # (owner-only). See JWTAuthenticationFilter.isPublicPath.
    public-paths:
      - /rentals/v1/auth/login
      - /rentals/v1/auth/register
      - /rentals/v1/auth/refresh
      - /rentals/v1/auth/forgot-password
      - /rentals/v1/auth/reset-password
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /api/auth/forgot-password
      - /api/auth/reset-password
      # ─── Public property browse (read-only) ───
      # Buildings + flats + their images are world-readable so the
      # landing / browse pages render without sign-in. Same model as
      # NoBroker / 99acres / Zillow — listings are SEO-friendly and
      # indexable. Only GETs are public; POST / PUT / DELETE still
      # require a valid JWT.
      - GET /rentals/v1/properties/flats
      - GET /rentals/v1/properties/flats/**
      - GET /rentals/v1/properties/buildings
      - GET /rentals/v1/properties/buildings/**
      - GET /rentals/v1/properties/images/**
      - GET /api/properties/flats
      - GET /api/properties/flats/**
      - GET /api/properties/buildings
      - GET /api/properties/buildings/**
      - GET /api/properties/images/**
      # ─── Document blob streaming (HMAC pre-signed URL is the auth) ───
      # The /documents/{id}/blob endpoint verifies its own
      # expires + signature query params (HMAC-SHA256). That IS the
      # auth — the JWT layer would be redundant and worse, would
      # break <img src=…> rendering in the browser (avatars,
      # ID-proof previews) because <img> can't send the Authorization
      # header. Open ONLY the GET so anonymous reads with a valid
      # signature stream the file; mutations stay locked.
      - GET /rentals/v1/documents/*/blob
      - GET /api/documents/*/blob
      # ─── Payment gateway webhooks + mock checkout (unauthenticated) ───
      # Razorpay / Stripe webhook callbacks reach us from the gateway's
      # own servers — they cannot supply our user JWT. The webhook
      # handler itself enforces HMAC signature verification + a strict
      # body-size cap + idempotency-via-processed_webhooks-table, so
      # the security model is "auth = valid signature", not JWT.
      # Without this whitelist EVERY webhook returned 401 at the
      # gateway and payments NEVER moved to PAID via the async path
      # (only the synchronous /verify on browser return worked).
      - POST /rentals/v1/payments/webhook
      - POST /api/payments/webhook
      # MockPaymentGateway's stub checkout / return pages — used only
      # when app.payment.gateway=mock. They're plain HTML / redirect
      # endpoints with no sensitive data; gating them with JWT broke
      # the click-through "Pay" button on the mock checkout form
      # (browser GET, no Authorization header).
      - GET /rentals/v1/payments/mock/**
      - GET /api/payments/mock/**
      # ─── Public social-proof endpoints (landing / about page stats) ───
      # Both return only AGGREGATE numbers (lifetime collected ₹, recent
      # approved reviews). No PII, no per-user data — safe to expose to
      # unauthenticated visitors. Used by the live-counter strip on the
      # landing page and the "By the numbers" section on /about.
      - GET /rentals/v1/payments/stats/public/**
      - GET /api/payments/stats/public/**
      - GET /rentals/v1/reviews/featured
      - GET /api/reviews/featured
      - /actuator/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /webjars/**
      - /aggregate/**
      - /__cb/**

# ---------- Resilience4j ----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        # Only trip on actual hard failures (5xx / connection refused).
        # 50% was reasonable for a steady-state production deploy but
        # bit hard during dev when one transient cold-start failure +
        # a quick retry could open the breaker for 10s. Keeping the
        # threshold at 50 still catches a real outage; the change is
        # the slow-call thresholds below.
        failureRateThreshold: 50
        # Effectively disable slow-call rate-based tripping —
        # property-service's cold-start assign + agreement-create can
        # touch 8s legitimately on the first call, and the 5s + 50%
        # combination would mark even a single such call as a "slow
        # failure" and open the breaker. We still surface slow calls
        # in actuator metrics, just don't blow up traffic over them.
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 20s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      defaultCircuitBreaker:             { baseConfig: default }
      authServiceCircuitBreaker:         { baseConfig: default }
      propertyServiceCircuitBreaker:     { baseConfig: default }
      userServiceCircuitBreaker:         { baseConfig: default }
      paymentServiceCircuitBreaker:      { baseConfig: default }
      maintenanceServiceCircuitBreaker:  { baseConfig: default }
      notificationServiceCircuitBreaker: { baseConfig: default }
      analyticsServiceCircuitBreaker:    { baseConfig: default }
      kycServiceCircuitBreaker:          { baseConfig: default }
      complianceServiceCircuitBreaker:   { baseConfig: default }
      leaseServiceCircuitBreaker:        { baseConfig: default }
      documentServiceCircuitBreaker:     { baseConfig: default }
      reviewServiceCircuitBreaker:       { baseConfig: default }
  timelimiter:
    configs:
      default:
        # Aligned with the bumped httpclient response-timeout above.
        # Anything over this hits the @CircuitBreaker fallback as a
        # TimeoutException and counts toward failureRateThreshold —
        # so it should be ≥ response-timeout to avoid double-counting
        # the same slow call as both an httpclient timeout and a
        # tlimiter timeout.
        timeoutDuration: 30s
        cancelRunningFuture: true
    instances:
      authServiceCircuitBreaker:         { baseConfig: default }
      propertyServiceCircuitBreaker:     { baseConfig: default }
      userServiceCircuitBreaker:         { baseConfig: default }
      paymentServiceCircuitBreaker:      { baseConfig: default }
      maintenanceServiceCircuitBreaker:  { baseConfig: default }
      notificationServiceCircuitBreaker: { baseConfig: default }
      analyticsServiceCircuitBreaker:    { baseConfig: default }
      kycServiceCircuitBreaker:          { baseConfig: default }
      complianceServiceCircuitBreaker:   { baseConfig: default }
      leaseServiceCircuitBreaker:        { baseConfig: default }
      documentServiceCircuitBreaker:     { baseConfig: default }
      reviewServiceCircuitBreaker:       { baseConfig: default }

# ---------- Eureka ----------
eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

# ---------- Actuator ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
# ---------- Springdoc / Swagger UI aggregation ----------
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
    use-root-path: true
    operationsSorter: method
    tagsSorter: alpha
    urls:
      - name: "1. Auth Service"
        url:  /aggregate/auth-service/v3/api-docs
      - name: "2. Property Service"
        url:  /aggregate/property-service/v3/api-docs
      - name: "3. User Service"
        url:  /aggregate/user-service/v3/api-docs
      - name: "4. Payment Service"
        url:  /aggregate/payment-service/v3/api-docs
      - name: "5. Maintenance Service"
