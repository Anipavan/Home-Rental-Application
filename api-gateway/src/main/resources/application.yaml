server:
  port: 8086

spring:
  application:
    name: HRA-API-Gateway-service
  cloud:
    gateway:
      routes:
        - id: property-service
          uri: http://localhost:8088
          predicates:
            - Path=/properties/**

        - id: user-service
          uri: http://localhost:8087
          predicates:
            - Path=/users/**
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone: http://localhost:8761/eureka