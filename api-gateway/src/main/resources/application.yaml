# ---------- App-specific config ----------
app:
  jwt:
    secret: ${JWT_SECRET:U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODkwIQ==}
    issuer: ${JWT_ISSUER:home-rental-auth}
  internal-auth:
    secret: ${INTERNAL_AUTH_SECRET:Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
    allowed-clock-skew-seconds: 60
  gateway:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,Accept,X-Requested-With
      max-age-seconds: 3600
    public-paths:
      - /rentals/v1/auth/login
      - /rentals/v1/auth/register
      - /rentals/v1/auth/refresh
      - /rentals/v1/auth/forgot-password
      - /rentals/v1/auth/reset-password
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /api/auth/forgot-password
      - /api/auth/reset-password
      - /actuator/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /webjars/**
      - /aggregate/**
      - /__cb/**

# ---------- Resilience4j ----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      defaultCircuitBreaker:             { baseConfig: default }
      authServiceCircuitBreaker:         { baseConfig: default }
      propertyServiceCircuitBreaker:     { baseConfig: default }
      userServiceCircuitBreaker:         { baseConfig: default }
      paymentServiceCircuitBreaker:      { baseConfig: default }
      maintenanceServiceCircuitBreaker:  { baseConfig: default }
      notificationServiceCircuitBreaker: { baseConfig: default }
      analyticsServiceCircuitBreaker:    { baseConfig: default }
      kycServiceCircuitBreaker:          { baseConfig: default }
      complianceServiceCircuitBreaker:   { baseConfig: default }
      leaseServiceCircuitBreaker:        { baseConfig: default }
      documentServiceCircuitBreaker:     { baseConfig: default }
      reviewServiceCircuitBreaker:       { baseConfig: default }
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true
    instances:
      authServiceCircuitBreaker:         { baseConfig: default }
      propertyServiceCircuitBreaker:     { baseConfig: default }
      userServiceCircuitBreaker:         { baseConfig: default }
      paymentServiceCircuitBreaker:      { baseConfig: default }
      maintenanceServiceCircuitBreaker:  { baseConfig: default }
      notificationServiceCircuitBreaker: { baseConfig: default }
      analyticsServiceCircuitBreaker:    { baseConfig: default }
      kycServiceCircuitBreaker:          { baseConfig: default }
      complianceServiceCircuitBreaker:   { baseConfig: default }
      leaseServiceCircuitBreaker:        { baseConfig: default }
      documentServiceCircuitBreaker:     { baseConfig: default }
      reviewServiceCircuitBreaker:       { baseConfig: default }

# ---------- Eureka ----------
eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

# ---------- Actuator ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}

# ---------- Springdoc / Swagger UI aggregation ----------
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
    use-root-path: true
    operationsSorter: method
    tagsSorter: alpha
    urls:
      - name: "1. Auth Service"
        url:  /aggregate/auth-service/v3/api-docs
      - name: "2. Property Service"
        url:  /aggregate/property-service/v3/api-docs
      - name: "3. User Service"
        url:  /aggregate/user-service/v3/api-docs
      - name: "4. Payment Service"
        url:  /aggregate/payment-service/v3/api-docs
      - name: "5. Maintenance Service"
        url:  /aggregate/maintenance-service/v3/api-docs
      - name: "6. Notification Service"
        url:  /aggregate/notification-service/v3/api-docs
      - name: "7. Analytics Service"
        url:  /aggregate/analytics-service/v3/api-docs
      - name: "8. KYC Service"
        url:  /aggregate/kyc-service/v3/api-docs
      - name: "9. Compliance Service"
        url:  /aggregate/compliance-service/v3/api-docs
      - name: "10. Lease Service"
        url:  /aggregate/lease-service/v3/api-docs
      - name: "11. Document Service"
        url:  /aggregate/document-service/v3/api-docs
      - name: "12. Review Service"
        url:  /aggregate/review-service/v3/api-docs

# ---------- Logging ----------
logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.filter.NettyRoutingFilter: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    reactor.netty.http.client: INFO
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
