spring:
  application:
    name: HRA-notification-service

  # Pull the real config from Config Server. Use optional: so the service
  # still starts during local dev when Config Server is down.
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 1500
        max-interval: 5000
        max-attempts: 3

  # Kafka — baseline so listeners can deserialize JSON events even when
  # Config Server is unreachable on cold start. Without this block,
  # value-deserializer defaults to StringDeserializer, the JSON payloads
  # arrive as raw Strings, Spring can't bind them to the listener's
  # typed parameter (MaintenanceCreatedEvent etc.), and every @KafkaListener
  # silently fails to invoke — bell stays empty, root cause of the
  # "notifications not working" symptom.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: hra-notification-service
      auto-offset-reset: earliest
      # ErrorHandlingDeserializer wraps the real deserializer so a
      # poison-pill record is logged + skipped instead of killing the
      # whole listener container.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # Producer side sets spring.json.add.type.headers=false so we
        # need to ignore type headers and rely on each @KafkaListener's
        # `properties = {"spring.json.value.default.type=..."}` to bind
        # the payload to the correct event class.
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        spring.json.use.type.headers: false

# Operational endpoints + structured logging are kept here so they're
# available even if Config Server is unreachable on first boot.
server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.mongodb.driver: WARN
    org.springframework.cloud.config: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

# Eureka client baseline so the service can register even before Config
# Server is reachable. Central config can still override.
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

# Auth-commons + Kafka topic name baselines — same defaults Config Server
# serves; kept here so initial Kafka listener startup doesn't depend on
# Config Server being reachable.
app:
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60

  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
    kyc-topic: kyc-events
    lease-topic: lease-events
    compliance-topic: compliance-events
    document-topic: document-events
