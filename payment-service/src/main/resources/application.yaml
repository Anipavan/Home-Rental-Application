server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

spring:
  application:
    name: HRA-payment-service

  # Default to dev profile — see auth-service/application.yaml for
  # the full rationale. Prod set SPRING_PROFILES_ACTIVE=prod (or any
  # non-dev value) and supply real env vars.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    # Hard placeholder — SecretsBootstrapValidator refuses this in prod.
    password: ${DB_PASSWORD:CHANGE_ME_LOCAL_DEV_PLACEHOLDER}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000


  # Flyway - disabled by default so local dev keeps using Hibernate
  # ddl-auto=update for fast iteration. application-prod.yaml flips
  # spring.flyway.enabled=true and locks ddl-auto to 'validate'.
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Pre-Flyway baseline (Hibernate-managed)"
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: hra-payment-service
      auto-offset-reset: earliest
      # Wrap with ErrorHandlingDeserializer so a poison-pill record is logged
      # & skipped instead of killing the listener container.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        spring.json.use.type.headers: false

# Bound by KafkaTopicProperties (in KafkaEvents shared lib)
app:
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60

  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events

  payment:
    # Active gateway implementation: mock (dev) | razorpay | stripe
    gateway: ${PAYMENT_GATEWAY:mock}
    # Late-fee policy
    late-fee-percent-per-week: ${LATE_FEE_PCT:2.0}
    max-late-fee-percent: ${MAX_LATE_FEE_PCT:10.0}
    # Reminder schedule: send a reminder N days before due date
    reminder-days-before-due: ${REMINDER_DAYS:3}

  razorpay:
    # All values below MUST be overridden via env in prod (Razorpay
    # dashboard → Keys / Webhooks). SecretsBootstrapValidator refuses
    # the placeholder defaults outside dev profiles.
    key-id: ${RAZORPAY_KEY_ID:CHANGE_ME_RAZORPAY_KEY_ID_PLACEHOLDER}
    key-secret: ${RAZORPAY_KEY_SECRET:CHANGE_ME_RAZORPAY_KEY_SECRET_PLACEHOLDER}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:CHANGE_ME_RAZORPAY_WEBHOOK_SECRET_PLACEHOLDER}

  stripe:
    secret-key: ${STRIPE_SECRET:CHANGE_ME_STRIPE_SECRET_KEY_PLACEHOLDER}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:CHANGE_ME_STRIPE_WEBHOOK_SECRET_PLACEHOLDER}

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
