server:
  port: 8089
  shutdown: graceful

spring:
  application:
    name: HRA-user-service

  # Default to dev profile — application-dev.yaml supplies real local
  # secrets so a no-config local run boots cleanly. Prod sets
  # SPRING_PROFILES_ACTIVE=prod (or any non-dev value) + env vars.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:CHANGE_ME_LOCAL_DEV_PLACEHOLDER}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # Flyway — disabled by default so local dev keeps using Hibernate
  # ddl-auto=update for fast iteration. application-prod.yaml flips
  # spring.flyway.enabled=true and locks ddl-auto to 'validate'.
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Pre-Flyway baseline (Hibernate-managed)"
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: hra-user-service
      auto-offset-reset: earliest
      # Wrap with ErrorHandlingDeserializer so a poison-pill record is logged
      # & skipped instead of killing the listener container.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        spring.json.use.type.headers: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# Bound by KafkaTopicProperties (in KafkaEvents shared lib)
app:
  # AES-256-GCM key used by EncryptedStringConverter to protect
  # PII columns at rest (currently bank_accounts.account_number).
  # MUST be supplied via env / secret manager in prod;
  # SecretsBootstrapValidator refuses to start the app with the
  # placeholder under any non-local profile.
  encryption:
    key: ${PII_ENCRYPTION_KEY:CHANGE_ME_LOCAL_DEV_ENCRYPTION_KEY_PLACEHOLDER}
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
    kyc-topic: kyc-events
    lease-topic: lease-events
    compliance-topic: compliance-events
    document-topic: document-events
  uploads:
    dir: ${USER_UPLOAD_DIR:uploads/users}

# ---------- Feign + circuit breakers ----------
# HRA-auth-service Feign client → CB instance "HRA-auth-service"
# HRA-property-service Feign client → CB instance "HRA-property-service"
feign:
  circuitbreaker:
    enabled: true
    group:
      enabled: false
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 60000
        retryer: feign.Retryer$NeverRetry
        loggerLevel: BASIC

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      HRA-auth-service:       { baseConfig: default }
      HRA-property-service:   { baseConfig: default }
  timelimiter:
    configs:
      default:
        timeoutDuration: 6s
        cancelRunningFuture: true
    instances:
      HRA-auth-service:       { baseConfig: default }
      HRA-property-service:   { baseConfig: default }
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - feign.RetryableException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignoreExceptions:
          - org.springframework.web.server.ResponseStatusException

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
