# ──────────────────────────────────────────────────────────────────
#  Test-scope overrides (loaded ahead of src/main/resources/application.yaml
#  by Spring Boot when JUnit is on the classpath).
#
#  H2 in Oracle-compat mode + a fixed AES key give the integration
#  tests a deterministic environment that doesn't need an Oracle
#  Testcontainer or any external infrastructure.
# ──────────────────────────────────────────────────────────────────
spring:
  application:
    name: HRA-user-service-test
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:hra-user-test;MODE=Oracle;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  # Disable Eureka + Kafka clients in tests so we don't spend the
  # boot-time discovery-wait when no broker / registry is reachable.
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:1}
    listener:
      auto-startup: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

# Fixed encryption key so the round-trip test can decrypt the
# ciphertext it stored on disk. Padding to 32 bytes happens inside
# EncryptedStringConverter — the value here can be anything.
app:
  encryption:
    key: "test-encryption-key-32-bytes-padded-elsewhere"
  internal-auth:
    enabled: false
    secret: "test-internal-secret-32-bytes-or-more-of-text"

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    root: WARN
    com.spa.home_rental_application: INFO
