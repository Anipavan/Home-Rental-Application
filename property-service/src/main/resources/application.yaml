server:
  port: 8088
  shutdown: graceful

spring:
  application:
    name: HRA-property-service

  # Default to dev profile — application-dev.yaml supplies real local
  # secrets so a no-config local run boots cleanly. Prod sets
  # SPRING_PROFILES_ACTIVE=prod (or any non-dev value) + env vars.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
      acks: all
      retries: 3

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:CHANGE_ME_LOCAL_DEV_PLACEHOLDER}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000


  # Flyway - disabled by default so local dev keeps using Hibernate
  # ddl-auto=update for fast iteration. application-prod.yaml flips
  # spring.flyway.enabled=true and locks ddl-auto to 'validate'.
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Pre-Flyway baseline (Hibernate-managed)"
    locations: classpath:db/migration
    validate-on-migrate: true
    # Per-service history table. All 8 Java services share the same
    # Oracle user (HRA_APP) — without an explicit table name they all
    # default to "flyway_schema_history" and stomp on each other's
    # migration records (e.g. kyc's V2__digilocker_columns ended up
    # blocking property's V2__vacate_comments because they share a
    # row, different content). Naming the table per-service isolates
    # each service's migration history. See incident notes 2026-05-23.
    table: flyway_schema_history_property

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  # MUST match the value on the API Gateway. Direct hits without a valid
  # gateway signature get a 403 GATEWAY_REQUIRED. Disable for unit tests.
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60

  # Topic names are bound by com.spa.home_rental_application.KafkaEvents.config.KafkaTopicProperties
  # which lives in the KafkaEvents shared library. Centralised here per environment.
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
  uploads:
    # Absolute path on the container's writable volume (Dockerfile
    # declares VOLUME /data/uploads and chowns it to the app user).
    # The legacy default was "uploads" which resolved against
    # WORKDIR /app — /app/uploads is NOT writable, so every upload
    # would 500 with AccessDeniedException. Anchored absolute now;
    # override via PROPERTY_UPLOAD_DIR if you need a different mount.
    dir: ${PROPERTY_UPLOAD_DIR:/data/uploads}
  agreements:
    # Where the rendered lease deed PDFs land. Same reasoning as
    # uploads.dir above — absolute path under the writable /data
    # volume so the PDF render doesn't hit AccessDeniedException
    # on /app/uploads. Override via AGREEMENT_DEED_DIR if needed.
    deed-storage-dir: ${AGREEMENT_DEED_DIR:/data/uploads/lease-deeds}
    # Signed-deed copies (post-tenant-signature) — keep them next to
    # the unsigned originals on the same writable volume but in a
    # separate folder so the unsigned-vs-signed audit trail stays
    # legible to operators tarball-grepping the disk.
    signed-deed-storage-dir: ${AGREEMENT_SIGNED_DEED_DIR:/data/uploads/lease-deeds-signed}

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
