server:
  port: 8088
  shutdown: graceful

spring:
  application:
    name: HRA-property-service

  lifecycle:
    timeout-per-shutdown-phase: 20s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
      acks: all
      retries: 3

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:Pavan@123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  # MUST match the value on the API Gateway. Direct hits without a valid
  # gateway signature get a 403 GATEWAY_REQUIRED. Disable for unit tests.
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:Z2F0ZXdheS1zaGFyZWQtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9k}
    allowed-clock-skew-seconds: 60

  # Topic names are bound by com.spa.home_rental_application.KafkaEvents.config.KafkaTopicProperties
  # which lives in the KafkaEvents shared library. Centralised here per environment.
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
  uploads:
    dir: ${PROPERTY_UPLOAD_DIR:uploads}
  agreements:
    # Where the rendered lease deed PDFs land. Mount a Docker volume here
    # so deeds survive container restarts.
    deed-storage-dir: ${AGREEMENT_DEED_DIR:uploads/lease-deeds-property}

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
