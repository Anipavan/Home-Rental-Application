# ─────────────────────────────────────────────────────────────────
#  Production profile overrides for user-service.
#
#  Activated by setting SPRING_PROFILES_ACTIVE=prod (or, in our
#  Docker images, ACTIVE_PROFILE=prod). Everything in here REPLACES
#  the matching key in the default application.yaml — keep this
#  file as small as possible; only override what's genuinely
#  dangerous outside dev.
# ─────────────────────────────────────────────────────────────────
spring:
  # Flyway-driven schema management in prod. With
  # baseline-on-migrate=true the first boot against an existing
  # database stamps it as version 1 without trying to re-create
  # tables. validate-on-migrate=true makes any drift between the
  # checked-in V*.sql files and the recorded history a startup
  # failure (the right failure mode).
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    # ─── Per-service Flyway history table ───
    # Multiple microservices share the HRA_APP Oracle schema (one DB
    # user, one schema, many app services). Without a per-service
    # table name, ALL of them would write to the default
    # `flyway_schema_history` and trip "description mismatch" /
    # "checksum mismatch" on every restart because each service's
    # V2/V3/… is a different migration.
    #
    # The fix is to give each service its own history table. This
    # change combined with `baseline-version: 3` below (and the
    # pre-populated rows on first boot — see deploy notes) lets
    # property-service walk through its own migration timeline
    # independently of kyc-service / payment-service / etc.
    table: property_flyway_history
    # Baseline at V2 — V1 (no-op baseline) + V2 (vacate_comments,
    # adds scheduled_vacate_comments to flats) are already reflected
    # in the existing schema. V3 (society_tables) is NEW and must
    # actually run to create the 4 building_society_config / etc.
    # tables before Hibernate's ddl-auto=validate accepts the JPA
    # entities at startup.
    #
    # V3 itself is idempotent (PL/SQL EXCEPTION blocks swallow
    # ORA-00955 'object already exists'), so a future fresh deploy
    # where V3 also runs is also safe.
    baseline-version: 2
    baseline-description: "Pre-existing schema baseline (vacate_comments already applied)"

  jpa:
    hibernate:
      # No auto-schema mutations in prod. Schema changes must come
      # from explicit Liquibase/Flyway migrations, not Hibernate's
      # best-guess diff. Mismatch → app fails to start (which is
      # the right failure mode — better than silently dropping a
      # column).
      ddl-auto: validate
    # Never log SQL in prod — leaks query patterns into log
    # aggregation + clobbers disk + bypasses parameter binding logs.
    show-sql: false
    properties:
      hibernate:
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        # Strip env + loggers — both can leak property keys (env)
        # or be used to flip log level to DEBUG and dump sensitive
        # data into the log stream (loggers). Health/info/metrics/
        # prometheus are the bare-minimum probe + scrape surface.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # Anonymous health probes (k8s liveness/readiness) should NOT
      # see internal db / disk / kafka detail — flip to never. The
      # /actuator/health/{liveness,readiness} group endpoints still
      # return up/down, which is all kubelet needs.
      show-details: never

# SecretsBootstrapValidator (in auth-commons) refuses to start
# this app under any non-dev profile when sensitive keys
# (spring.datasource.password, app.jwt.secret, app.internal-auth.secret,
# app.encryption.key, razorpay/stripe credentials) still carry a
# CHANGE_ME / placeholder value. Nothing extra needed here — the
# fail-fast is automatic when `spring.profiles.active=prod`.

  tracing:
    sampling:
      # 10% of requests in prod — keeps span volume manageable +
      # latency cost negligible. Bump in incidents via env override
      # (MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0).
      probability: 0.1
    propagation:
      type: w3c

# OTLP exporter — span shipping endpoint. The OTEL collector / Jaeger /
# Tempo / Datadog Agent should listen on this URL. In k8s usually a
# sidecar or DaemonSet at http://otel-collector.observability:4318.
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}
      protocol: ${OTEL_EXPORTER_OTLP_PROTOCOL:http/protobuf}
