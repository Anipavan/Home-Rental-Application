<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA manifest + Apple-touch-icon. Drop these two lines (plus
         the SW registration block in src/main.tsx and the public/sw.js
         + public/manifest.webmanifest files) to remove PWA support
         entirely. Users with the SW already cached can unregister via
         DevTools → Application → Service Workers; otherwise the SW
         self-expires on the next deploy since CACHE name is version-
         pinned in sw.js. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- theme-color is the new emerald brand primary (matches
         hsl(158 64% 38%)) so the browser chrome on mobile tints to
         match the app. -->
    <meta name="theme-color" content="#23a47a" />
    <meta
      name="description"
      content="Anirudh Homes — find a home you'll love, manage rentals you'll trust."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Plus Jakarta Sans (display headings) + Inter (body). The two
         pair without contrast jumps because they share similar
         x-height + geometric construction. Display kept narrow on
         weights so the bundle stays light. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Anirudh Homes — Home Rentals, simplified</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
