<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- theme-color is the new terracotta brand primary (matches
         hsl(14 75% 47%)) so the browser chrome on mobile tints to
         match the app instead of the old indigo. -->
    <meta name="theme-color" content="#c9572e" />
    <meta
      name="description"
      content="Hearth — find a home you'll love, manage rentals you'll trust."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fraunces (variable serif) for editorial display headings,
         Inter for body. Optical-size axis pulled in via opsz so
         large H1s render with higher contrast and smaller H3s stay
         readable. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Hearth — Home Rentals, simplified</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
