# ────────────────────────────────────────────────────────────────────
#  Anirudh Homes frontend — production nginx config.
#
#  Serves the Vite-built static bundle out of /usr/share/nginx/html
#  and reverse-proxies /api/* to the API gateway. The /api prefix
#  matches what the Vite dev-server proxy uses, so the same axios
#  baseURL (VITE_API_BASE_URL=/api/rentals/v1) works in dev AND
#  through this nginx in prod with zero FE code changes.
#
#  Environment variable contract:
#    API_GATEWAY_URL — internal URL of the gateway service. In
#                      docker-compose, defaults to http://api-gateway:8080.
#                      In k8s, this is the cluster-internal Service URL
#                      (e.g. http://api-gateway.default.svc:8080).
#                      Falls back to a sensible compose default.
# ────────────────────────────────────────────────────────────────────

# Map: pick the API_GATEWAY_URL env var if set, otherwise fall back
# to the docker-compose default. nginx doesn't natively read env vars
# in directives — but the `envsubst` step in the Docker image
# entrypoint (default in nginx:alpine) handles ${VAR} substitution
# at container startup IF the file is under /etc/nginx/templates/.
# We keep this file at /etc/nginx/conf.d/ and rely on a fixed default
# instead; operators who need a different gateway URL should mount
# their own conf.d file or use the templates dir.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # Don't leak nginx version in headers or error pages.
    server_tokens off;

    # ── Runtime DNS resolution for upstreams ───────────────────────
    # nginx resolves hostnames in `proxy_pass` exactly ONCE at config
    # load time and caches the result forever. In a docker-compose
    # network, `api-gateway` can take a new container IP whenever the
    # gateway service is recreated (e.g. an image rebuild, a manual
    # `up -d --force-recreate`, a host reboot that reshuffles IPAM).
    # When that happens, our cached IP stops accepting connections
    # and EVERY request from the SPA dies with 502 "Connection
    # refused" until the frontend container is itself restarted.
    #
    # The fix is two-part:
    #
    #   1. Point nginx at Docker's embedded DNS resolver
    #      (127.0.0.11). It already serves the compose service names
    #      (api-gateway, oracle-db, etc.) and updates instantly when
    #      containers are recreated. `valid=10s` caps how long nginx
    #      caches a positive lookup before re-querying, so even a
    #      gateway IP shuffle resolves within 10 seconds end-to-end.
    #      `ipv6=off` quiets a warning about AAAA records the
    #      compose-network DNS doesn't serve.
    #
    #   2. Switch the `proxy_pass` upstream to a variable
    #      (`set $upstream ...; proxy_pass http://$upstream;`).
    #      Using a literal hostname in `proxy_pass` bypasses the
    #      resolver entirely — nginx falls back to the cached
    #      startup-time IP. The variable form forces nginx to use
    #      the resolver on every request.
    #
    # Result: frontend never needs to be restarted to follow a
    # gateway redeploy. The 13-Jun-2026 outage where every API call
    # 502'd for hours after a property-service recreate was rooted
    # exactly here.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Upload size ────────────────────────────────────────────────
    # Documents (ID proofs, lease attachments, flat photos) flow
    # through the /api/ proxy to document-service, which itself
    # accepts up to 25 MB per file (set in DocumentationService
    # application.yaml + docker-compose.fix.yml). nginx's default of
    # 1m REJECTS anything bigger with HTTP 413 BEFORE it ever reaches
    # the gateway — which is exactly the 413 tenants were hitting on
    # PAN cards / Aadhaar PDFs / phone photos.
    #
    # 30 MB gives a 5 MB head-room over the backend cap so we never
    # 413 a request that document-service would have accepted, while
    # still rejecting genuinely-malicious oversized uploads at the
    # edge.
    client_max_body_size 30M;

    # gzip for everything compressible. Brotli would be better but
    # requires the brotli module which isn't in nginx:alpine by default.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Static assets ──────────────────────────────────────────────
    # Vite emits content-hashed filenames for /assets/* so they're
    # safe to cache for a year. The index.html itself stays
    # short-cached so the next deploy actually rolls out.
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        # No caching on the entry document — must always reflect
        # the latest deploy.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # ── API proxy ──────────────────────────────────────────────────
    # Forward /api/* to the gateway. The gateway expects paths
    # starting with /rentals/v1/... so we strip the /api prefix
    # before forwarding — same shape as the Vite dev proxy.
    location /api/ {
        # Variable-form upstream (`$gw_api`) forces nginx to use the
        # `resolver` directive above for every request instead of
        # latching the IP at config-load time — see the long note
        # near the top of the server block. K8s deployments should
        # override this via a mounted conf.d snippet.
        set $gw_api api-gateway:8080;
        proxy_pass http://$gw_api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout   60s;
        proxy_send_timeout   60s;
        proxy_connect_timeout 5s;
        # Buffer off so SSE / streaming responses (notification bell
        # uses a /sse endpoint) flush in real time.
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Razorpay payment-return callback ───────────────────────────
    # Razorpay's hosted-checkout `redirect=1` mode does a POST to
    # the callback_url the SPA registered when launching the
    # payment — currently /rentals/v1/payments/razorpay-return/{id}.
    # Without an explicit proxy here, that POST falls through to the
    # SPA fallback (`try_files .. /index.html`) which is a static-
    # file location and returns 405 Not Allowed.
    #
    # We can't push Razorpay onto /api/* because the callback URL
    # is baked into the payment record at create-time AND the
    # gateway already whitelists the un-prefixed path
    # (POST /rentals/v1/payments/razorpay-return/** is in
    # api-gateway public-paths). So the fix is to forward exactly
    # this path straight to the gateway preserving the URI.
    location ^~ /rentals/v1/payments/razorpay-return/ {
        # Variable-form upstream so DNS re-resolves per request —
        # same reason as /api/ above. Without this, every container
        # recreate of api-gateway breaks Razorpay return callbacks
        # until the frontend is restarted.
        set $gw_razorpay api-gateway:8080;
        proxy_pass http://$gw_razorpay;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout   60s;
        proxy_send_timeout   60s;
        proxy_connect_timeout 5s;
        proxy_buffering off;
    }

    # ── SPA fallback ───────────────────────────────────────────────
    # Every URL the user types directly into the address bar that
    # isn't /api/* or /assets/* should serve index.html. React
    # Router then matches client-side. The 404 fallthrough below
    # handles genuine static-asset 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────
    # CSP is set as a <meta> tag in index.html (injected by the Vite
    # plugin at build time) — keep the rest as HTTP headers here so
    # they're enforced before the body even reaches the parser.
    add_header X-Frame-Options          "DENY"                       always;
    add_header X-Content-Type-Options   "nosniff"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "interest-cohort=()"         always;

    # ── Custom 404 / 50x pages would slot in here, but Vite already
    # ships a SPA-level 404 view inside index.html via the router. ──

    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}
