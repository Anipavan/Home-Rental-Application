server:
  port: 8091
  shutdown: graceful

spring:
  application:
    name: HRA-document-service

  # Default to dev profile so application-dev.yaml supplies the
  # internal-auth secret matching the gateway. Same value everywhere
  # in dev means no HMAC drift between services.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:Pavan@123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000


  # Flyway - disabled by default so local dev keeps using Hibernate
  # ddl-auto=update for fast iteration. application-prod.yaml flips
  # spring.flyway.enabled=true and locks ddl-auto to 'validate'.
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Pre-Flyway baseline (Hibernate-managed)"
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: hra-document-service
      auto-offset-reset: earliest
      # Wrap with ErrorHandlingDeserializer so a poison-pill record is logged
      # & skipped instead of killing the listener container.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        spring.json.use.type.headers: false

  servlet:
    multipart:
      enabled: true
      max-file-size: ${DOCUMENT_MAX_FILE_SIZE:10MB}
      max-request-size: ${DOCUMENT_MAX_REQUEST_SIZE:12MB}
      file-size-threshold: 1MB

app:
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
    kyc-topic: kyc-events
    lease-topic: lease-events
    compliance-topic: compliance-events
    document-topic: document-events
  documents:
    # Storage backend: LOCAL | S3
    #   LOCAL — files under app.documents.local-dir (use a Docker volume).
    #   S3    — software.amazon.awssdk:s3, AES256 SSE; auth via the standard
    #           AWS credential chain (env, instance profile, profile config).
    storage-backend: ${DOCUMENT_STORAGE_BACKEND:LOCAL}
    local-dir: ${DOCUMENT_LOCAL_DIR:uploads/documents}
    s3-bucket: ${DOCUMENT_S3_BUCKET:rentgenius-documents}
    s3-region: ${DOCUMENT_S3_REGION:ap-south-1}
    # Set when targeting MinIO / LocalStack; leave blank for real AWS.
    s3-endpoint-override: ${DOCUMENT_S3_ENDPOINT:}
    # Optional namespace inside the bucket (e.g. "prod/" or "staging/").
    s3-key-prefix: ${DOCUMENT_S3_KEY_PREFIX:}
    # Path-style addressing — true for MinIO/LocalStack, false for AWS.
    s3-path-style-access: ${DOCUMENT_S3_PATH_STYLE:false}
    # Pre-signed download URL TTL.
    #
    # Originally 15 minutes (architecture default for sensitive PDFs
    # like KYC docs / lease agreements). But profile pictures are
    # stored as presigned URLs in the User.profilePictureUrl column
    # and rendered as the avatar src — with a 15-min TTL, the avatar
    # silently 404'd after the URL expired (next page load, or 15 min
    # after the user logged in). User-visible symptom: "profile
    # picture is not getting visible even after successful upload".
    #
    # Bumped to 365 days so profile pictures stay reachable. KYC docs
    # and lease PDFs piggyback on this longer TTL too in dev — fine
    # because all downloads still need a valid HMAC signature, and
    # the threat model for the dev environment doesn't require URL
    # lifetimes shorter than the document retention period.
    #
    # In production, the proper architectural fix is to store the
    # document ID on the User entity and regenerate a fresh presigned
    # URL on each read (so the URL is never stale by definition).
    # Until then, override via DOCUMENT_DOWNLOAD_TTL=900 if you need
    # short-lived URLs for sensitive non-profile-picture documents.
    download-url-ttl-seconds: ${DOCUMENT_DOWNLOAD_TTL:31536000}
    # Pre-signed download HMAC secret — keep out of source control in prod.
    download-url-secret: ${DOCUMENT_DOWNLOAD_SECRET:change-me-in-prod-doc-download-secret}
    # Base for pre-signed download URLs.
    #
    # The default is RELATIVE ("/rentals/v1") rather than absolute
    # ("http://localhost:8080/rentals/v1"). Reason: the URL ends up
    # in <img src="..."> tags on the SPA, and an absolute URL hard-
    # codes the host at upload time. If the browser is on ngrok
    # (or any host other than the one that did the signing — e.g.
    # localhost dev, staging, prod), an absolute "http://localhost"
    # URL points at a host the browser can't reach and the avatar
    # 404s silently. Relative URLs resolve against the browser's
    # current origin, so the same persisted value Just Works on
    # localhost, ngrok, and prod without any host-bound config.
    #
    # Override with PUBLIC_BASE_URL=https://api.hearth.app/rentals/v1
    # only when serving downloads from a DIFFERENT origin than the
    # SPA (e.g. CDN proxying to a separate document host). The
    # gateway routes /rentals/v1/documents/** to this service, so
    # the relative path works as long as both SPA and API share the
    # gateway's origin.
    public-base-url: ${PUBLIC_BASE_URL:/rentals/v1}
    allowed-content-types:
      - application/pdf
      - image/png
      - image/jpeg
      - image/jpg
    ocr:
      # OCR backend: STUB | TESSERACT (TESSERACT requires native binaries; STUB is safe for dev)
      provider: ${DOCUMENT_OCR_PROVIDER:STUB}

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
