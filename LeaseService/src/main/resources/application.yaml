server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: HRA-lease-service

  # Default to dev profile so application-dev.yaml supplies the
  # internal-auth secret matching the gateway. Same value everywhere
  # in dev means no HMAC drift between services.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:Pavan@123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000


  # Flyway - disabled by default so local dev keeps using Hibernate
  # ddl-auto=update for fast iteration. application-prod.yaml flips
  # spring.flyway.enabled=true and locks ddl-auto to 'validate'.
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Pre-Flyway baseline (Hibernate-managed)"
    locations: classpath:db/migration
    validate-on-migrate: true
    # Per-service history table — see incident notes 2026-05-23.
    # All Java services share user HRA_APP; without a unique table
    # name they collide on Flyway's default flyway_schema_history.
    table: flyway_schema_history_lease

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: hra-lease-service
      auto-offset-reset: earliest
      # Wrap with ErrorHandlingDeserializer so a poison-pill record is logged
      # & skipped instead of killing the listener container.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        spring.json.use.type.headers: false

  task:
    scheduling:
      pool:
        size: 2

app:
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
    kyc-topic: kyc-events
    lease-topic: lease-events
    compliance-topic: compliance-events
    document-topic: document-events
  lease:
    expiry-warning-days: ${LEASE_EXPIRY_WARNING_DAYS:60}
    default-rent-increment-percent: ${LEASE_RENT_INCREMENT_PERCENT:5.0}
    deed-storage-dir: ${LEASE_DEED_DIR:uploads/lease-deeds}
    # Cron — every day at 02:00 server time. Override per env.
    expiry-cron: ${LEASE_EXPIRY_CRON:0 0 2 * * *}

feign:
  circuitbreaker:
    enabled: true
    group:
      enabled: false
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 60000
        retryer: feign.Retryer$NeverRetry
        loggerLevel: BASIC

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      HRA-compliance-service:   { baseConfig: default }
  timelimiter:
    configs:
      default:
        timeoutDuration: 6s
    instances:
      HRA-compliance-service:   { baseConfig: default }

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
