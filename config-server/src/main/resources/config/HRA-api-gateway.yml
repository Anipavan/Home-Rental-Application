# API Gateway — overrides served by Config Server
# (route table stays in the gateway's own application.yaml because it's
#  too verbose to centralise comfortably; we only override secrets here)
server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODkwIQ==}
    issuer: ${JWT_ISSUER:home-rental-auth}

  gateway:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
