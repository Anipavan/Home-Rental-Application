# Analytics Service — overrides served by Config Server
server:
  port: ${SERVER_PORT:8087}

spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:Pavan@123}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: hra-analytics-service
      auto-offset-reset: earliest

app:
  analytics:
    export-dir: ${ANALYTICS_EXPORT_DIR:reports}
