# Notification Service — overrides served by Config Server
server:
  port: ${SERVER_PORT:8086}

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/HomeRentalDB}
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: hra-notification-service
      auto-offset-reset: earliest
      # Mirror of the baseline in notification-service/application.yaml.
      # Required so @KafkaListener can deserialize JSON events from the
      # other services (auth/payment/maintenance/kyc/etc) — without it
      # values arrive as raw Strings and the listener parameter binding
      # silently fails, which is the visible "no notifications" bug.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        spring.json.use.type.headers: false

  # SMTP settings — override in prod via env vars
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@homerental.local}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  notification:
    # Master switch; set false in dev to swap real adapters for the noop ones
    delivery-enabled: ${NOTIFICATION_DELIVERY:true}
    from-email: ${NOTIFICATION_FROM_EMAIL:no-reply@homerental.local}
    from-name:  ${NOTIFICATION_FROM_NAME:Home Rental}
    max-retries: 3
    retry-interval-minutes: 5

  twilio:
    account-sid: ${TWILIO_SID:placeholder}
    auth-token:  ${TWILIO_TOKEN:placeholder}
    # Sender for SMS — plain E.164 number.
    from-number: ${TWILIO_FROM:+10000000000}
    # Sender for WhatsApp — plain E.164 number; the adapter prepends
    # "whatsapp:" itself. Production uses your pre-registered sender;
    # Twilio sandbox uses +14155238886 (set via env var TWILIO_WHATSAPP_FROM).
    whatsapp-from-number: ${TWILIO_WHATSAPP_FROM:+14155238886}

  fcm:
    server-key: ${FCM_SERVER_KEY:placeholder}
