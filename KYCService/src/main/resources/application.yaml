server:
  port: 8092
  shutdown: graceful

spring:
  application:
    name: HRA-kyc-service

  # Default to dev profile so application-dev.yaml supplies the
  # internal-auth secret matching the gateway. Same value everywhere
  # in dev means no HMAC drift between services.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl}
    username: ${DB_USERNAME:siva}
    password: ${DB_PASSWORD:Pavan@123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000


  # Flyway - disabled by default so local dev keeps using Hibernate
  # ddl-auto=update for fast iteration. application-prod.yaml flips
  # spring.flyway.enabled=true and locks ddl-auto to 'validate'.
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Pre-Flyway baseline (Hibernate-managed)"
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 25

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: hra-kyc-service
      auto-offset-reset: earliest
      # Wrap with ErrorHandlingDeserializer so a poison-pill record (e.g. an
      # old/foreign payload at offset 0) is logged & skipped instead of
      # killing the listener container with a SerializationException.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.spa.home_rental_application.KafkaEvents.*"
        # Producer publishes without __TypeId__ headers, so tell the
        # deserializer what shape to bind to. user-events carries multiple
        # event types but they all share eventType/userId/timestamp fields,
        # which is what UserRegisteredConsumer reads.
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.spa.home_rental_application.KafkaEvents.Producers.DTO.UserServiceEvents.UserProfileCreatedEvent

# Bound by KafkaTopicProperties (in KafkaEvents shared lib)
app:
  internal-auth:
    enabled: ${INTERNAL_AUTH_ENABLED:true}
    secret: ${INTERNAL_AUTH_SECRET:CHANGE_ME_LOCAL_DEV_INTERNAL_AUTH_SECRET_PLACEHOLDER_AT_LEAST_32_BYTES_LONG}
    allowed-clock-skew-seconds: 60
  kafka:
    property-topic: property-events
    user-topic: user-events
    payment-topic: payment-events
    maintenance-topic: maintenance-events
    notification-topic: notification-events
    auth-topic: auth-events
    kyc-topic: kyc-events
    lease-topic: lease-events
    compliance-topic: compliance-events
    document-topic: document-events
  kyc:
    # Pluggable KYC providers — flip to MOCK locally so engineers don't need
    # real Digio / Signzy creds for everyday dev.
    provider: ${KYC_PROVIDER:MOCK}
    aadhaar-hash-salt: ${KYC_AADHAAR_SALT:change-me-in-prod-aadhaar-pepper}
    digio:
      base-url: ${DIGIO_BASE_URL:https://api.digio.in}
      api-key: ${DIGIO_API_KEY:}
      client-id: ${DIGIO_CLIENT_ID:}
      callback-url: ${DIGIO_CALLBACK_URL:http://localhost:8092/kyc/webhook/digio}
    pan:
      verify-url: ${PAN_VERIFY_URL:https://api.digio.in/v3/client/kyc/pan_verify}

feign:
  circuitbreaker:
    enabled: true
    group:
      enabled: false
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 60000
        retryer: feign.Retryer$NeverRetry
        loggerLevel: BASIC

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      digio-client:           { baseConfig: default }
  timelimiter:
    configs:
      default:
        timeoutDuration: 6s
        cancelRunningFuture: true
    instances:
      digio-client:           { baseConfig: default }
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:CHANGE_ME_LOCAL_DEV_EUREKA_PLACEHOLDER}@localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.spa.home_rental_application: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
